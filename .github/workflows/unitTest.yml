name: iOS starter workflow

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build and Test default scheme using any available iPhone simulator
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Setup Environment
        run: |
          brew install xcbeautify
      - name: Build and Test
        run: |
          device=`xcrun xctrace list devices | grep -oE 'iPhone.*?[^\(]+' | head -1`
          echo $device
          xcodebuild test -scheme "Feed" -destination "platform=iOS Simulator,name=$DEVICE" | xcbeautify